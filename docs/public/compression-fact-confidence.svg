<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 300" fill="none">
  <defs>
    <marker id="arrowGray" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#6b7280"/></marker>
  </defs>
  <style>text { font-family: system-ui, -apple-system, sans-serif; }</style>
  <text x="270" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#e2e2e2">Fact confidence scoring</text>
  <text x="270" y="34" text-anchor="middle" font-size="9" fill="#a3a3a3">LLM assigns importance; trivial facts are deprioritized</text>

  <rect x="14" y="48" width="160" height="108" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="94" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#94a3b8">Conversation</text>
  <text x="24" y="80" font-size="7" fill="#60a5fa">USER</text>
  <text x="50" y="80" font-size="7" fill="#cbd5e1">hey there!</text>
  <text x="24" y="93" font-size="7" fill="#a78bfa">ASST</text>
  <text x="50" y="93" font-size="7" fill="#cbd5e1">Hi! How can I help?</text>
  <text x="24" y="106" font-size="7" fill="#60a5fa">USER</text>
  <text x="50" y="106" font-size="7" fill="#cbd5e1">write me a long poem</text>
  <text x="24" y="119" font-size="7" fill="#a78bfa">ASST</text>
  <text x="50" y="119" font-size="7" fill="#cbd5e1">At the edge of day, where</text>
  <text x="50" y="130" font-size="7" fill="#cbd5e1">morning light fades softly...</text>
  <text x="94" y="148" text-anchor="middle" font-size="6.5" fill="#6b7280">(3400+ chars of poem)</text>

  <line x1="174" y1="102" x2="194" y2="102" stroke="#6b7280" stroke-width="1" marker-end="url(#arrowGray)"/>

  <rect x="196" y="48" width="180" height="108" rx="6" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="286" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#a78bfa">LLM extraction</text>

  <rect x="206" y="72" width="160" height="30" rx="3" fill="#14532d" fill-opacity="0.4" stroke="#22c55e" stroke-width="0.5"/>
  <text x="212" y="83" font-size="6.5" fill="#86efac">FACT: user | requested | long</text>
  <text x="212" y="93" font-size="6.5" fill="#86efac">poem | 0.9</text>
  <text x="362" y="88" font-size="7" font-weight="600" fill="#22c55e">HIGH</text>

  <rect x="206" y="108" width="160" height="22" rx="3" fill="#450a0a" fill-opacity="0.4" stroke="#ef4444" stroke-width="0.5"/>
  <text x="212" y="122" font-size="6.5" fill="#fca5a5">FACT: user | greeted | casually | 0.3</text>
  <text x="362" y="122" font-size="7" font-weight="600" fill="#ef4444">LOW</text>

  <text x="286" y="148" text-anchor="middle" font-size="6.5" fill="#6b7280">trivial greeting = low confidence</text>

  <line x1="286" y1="156" x2="286" y2="174" stroke="#6b7280" stroke-width="1" marker-end="url(#arrowGray)"/>

  <rect x="106" y="178" width="360" height="110" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="286" y="196" text-anchor="middle" font-size="8" font-weight="600" fill="#fbbf24">FactStore = Known facts block</text>
  <text x="286" y="210" text-anchor="middle" font-size="7" fill="#94a3b8">Sorted by confidence descending. Budget: 256 tokens.</text>

  <rect x="120" y="220" width="332" height="24" rx="3" fill="#14532d" fill-opacity="0.3" stroke="#22c55e" stroke-width="0.5"/>
  <text x="134" y="235" font-size="7" fill="#86efac">KEPT: user requested "long poem"</text>
  <text x="428" y="235" font-size="7" fill="#22c55e">0.9</text>

  <rect x="120" y="250" width="332" height="24" rx="3" fill="#450a0a" fill-opacity="0.3" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="134" y="265" font-size="7" fill="#fca5a5">DROP: user greeted "casually"</text>
  <text x="428" y="265" font-size="7" fill="#ef4444">0.3</text>
  <text x="310" y="290" text-anchor="middle" font-size="6.5" fill="#6b7280">dropped: budget spent on higher-confidence facts</text>
</svg>
